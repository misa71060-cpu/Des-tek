<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desátek</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f1ea;
    padding: 40px;
  }
  h1 {
    color: #3b2f2f;
  }
  p {
    font-size: 18px;
    margin-bottom: 30px;
  }
  button {
    padding: 15px 30px;
    font-size: 18px;
    background-color: #6b4c3b;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:hover {
    background-color: #8a6650;
  }
</style>
</head>
<body>

<h1>💰 Zaplať desátek vrchnosti</h1>

<p>
Ve středověku museli poddaní odvádět až 10 % úrody církvi.<br>
Nezaplatíš? Přijde trest… 😈
</p>

<button onclick="zaplatit()">Zaplatit nyní</button>

<script>
function zaplatit() {
  document.body.innerHTML = "<h1>🙏 Děkujeme</h1><p>Tvůj hřích byl odpuštěn.</p>";
}
</script>

</body>
</html>
